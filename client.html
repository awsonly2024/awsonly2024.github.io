<html xmlns="http://www.w3.org/1999/xhtml">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>HJCompany</title>

   <script type="text/javascript"
   src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/6.4.0/adapter.min.js"></script>
   <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
   <script type="text/javascript"
   src="https://cdnjs.cloudflare.com/ajax/libs/jquery.blockUI/2.70/jquery.blockUI.min.js"></script>
   <script type="text/javascript"
   src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.4.1/js/bootstrap.min.js"></script>
   <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.4.0/bootbox.min.js"></script>
   <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/spin.js/2.3.2/spin.min.js"></script>
   <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
   <script type="text/javascript" src="janus.js"></script>

</head>

<body>
username : <input type="text" id="username">
room : <input type="text" id="room">
<input type="button" id="start" value="접속하기">
<br><br>
<video class="rounded centered" id="remoteVideo" width="600vh" height="500vh" autoplay playsinline muted="muted" style="border:1px solid black"></video>

<script>
var version = 1.2;
var server = null;
server = "https://janus.jsflux.co.kr/janus";
let sfutest = null;

   $(document).ready(function() {

      Janus.init({debug:"all", callback: function(){

         var username = $('#username').val();
         var room = $('#room').val();

         $('#start').on('click',function(){
            

            janus = new Janus({
            server: server,
            success: function(){
               janus.attach({
                  plugin: "janus.plugin.videoroom",
                    success: (pluginHandle) => {
                        console.log(pluginHandle)

                        //pluginHandle을 sfutest가 받는다
                        sfutest = pluginHandle;
                        Janus.log("Plugin attached! (" + sfutest.getPlugin() + ", id=" + sfutest.getId() + ")");
                        Janus.log("  -- This is a publisher/manager");
                        pluginHandle.send({
                           message: {
                              request: "join",
                              room: parseInt(room),
                              ptype: "subscriber",
                              feed: username,
                           },
                        });
                     },
                     onmessage: (msg, jsep) => {
                        alert("onmessage")
                     if (jsep) {
                        pluginHandle.createAnswer({
                           jsep: jsep,
                           media: { audioSend: false, videoSend: false },
                           success: (jsep) => {
                                 pluginHandle.send({
                                    message: { request: "start" },
                                    jsep: jsep,
                                 });
                              },
                           });
                        }
                     },
                     onremotestream: (stream) => {
                        alert("onremotestream")
                           const videoElement = document.getElementById("remoteVideo");
                           videoElement.srcObject = stream;
                           videoElement.play();
                     },
                  })
               }
            })

         })

      }})
   })

   function joinAsSubscriber(roomId, feedId) {
    janus.attach({
        plugin: "janus.plugin.videoroom",
        success: (pluginHandle) => {
            pluginHandle.send({
                message: {
                    request: "join",
                    room: roomId,
                    ptype: "subscriber",
                    feed: feedId,
                },
            });
        },
        onmessage: (msg, jsep) => {
            if (jsep) {
                pluginHandle.createAnswer({
                    jsep: jsep,
                    media: { audioSend: false, videoSend: false },
                    success: (jsep) => {
                        pluginHandle.send({
                            message: { request: "start" },
                            jsep: jsep,
                        });
                    },
                });
            }
        },
        onremotestream: (stream) => {
            const videoElement = document.getElementById("remoteVideo");
            videoElement.srcObject = stream;
            videoElement.play();
        },
    });
}

</script>

</body>
